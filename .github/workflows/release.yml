name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]
    
    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Extract release notes
        id: extract_notes
        shell: pwsh
        run: |
          if (Test-Path CHANGELOG.md) {
            $changelog = Get-Content CHANGELOG.md -Raw
            $version = "${{ github.ref_name }}".TrimStart('v')
            # Regex to match the section for the current version
            # Matches from "## [version]" until the next "## [" or end of file
            if ($changelog -match "(?s)## \[$version\].*?(?=## \[|$)") {
              $notes = $matches[0]
              # Remove the header line to avoid duplication in release body
              $notes = $notes -replace "^## \[.*?\] - .*?(\r?\n)+", ""
              $notes = $notes.Trim()
              
              # Write to GITHUB_ENV for multi-line support
              "RELEASE_BODY<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append
              $notes | Out-File -FilePath $env:GITHUB_ENV -Append
              "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              Write-Host "No changelog found for version $version"
              "RELEASE_BODY=See the assets to download this version and install." | Out-File -FilePath $env:GITHUB_ENV -Append
            }
          } else {
             "RELEASE_BODY=See the assets to download this version and install." | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EyeMotion ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'ubuntu-22.04' && '--bundles deb,appimage' || '' }}

  release-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install frontend dependencies
        run: npm install

      - name: Build Android APK
        run: npm run tauri android build
        
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eyemotion-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
